<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine - ERU Pregnancy Tracker</title>
    <link rel="manifest" href="../public/manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link href="/api/assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <h1>
                <i class="bi bi-capsule"></i>
                My Medicines
            </h1>
            <div class="subtitle">ERU Pregnancy Tracker</div>
        </div>
        
        <div class="app-content">
            <div id="medicinesContainer">
                <div class="text-center">
                    <div class="loading-spinner mx-auto"></div>
                    <div class="mt-2 text-muted">Loading your medicines...</div>
                </div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-items">
                <a href="dashboard.html" class="nav-item">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="medicine.html" class="nav-item active">
                    <i class="bi bi-capsule"></i>
                    <span>Medicine</span>
                </a>
                <a href="diary.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>
                    <span>Diary</span>
                </a>
                <a href="profile.html" class="nav-item">
                    <i class="bi bi-person"></i>
                    <span>Profile</span>
                </a>
                <a href="#" onclick="logout()" class="nav-item">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(registration => console.log('SW registered'))
                .catch(error => console.log('SW registration failed'));
        }

        async function loadMedicines() {
            try {
                const response = await fetch('/api/get_user_medicines.php');
                const result = await response.json();
                
                if (result.success) {
                    const medicinesHtml = result.medicines.map(medicine => `
                        <div class="medicine-card fade-in">
                            <div class="medicine-name">${medicine.medicine_name}</div>
                            <div class="quantity">Quantity remaining: <strong>${medicine.quantity}</strong></div>
                            <button class="btn btn-primary-custom" onclick="takeMedicine(${medicine.id}, '${medicine.medicine_name}')" ${medicine.quantity <= 0 ? 'disabled' : ''}>
                                <i class="bi bi-check-circle me-2"></i>
                                TAKE MEDICINE
                            </button>
                        </div>
                    `).join('');
                    
                    document.getElementById('medicinesContainer').innerHTML = medicinesHtml || '<div class="empty-state"><i class="bi bi-capsule"></i><h3>No Medicines Assigned</h3><p>You don\'t have any medicines assigned yet. Please contact your administrator.</p></div>';
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error('Error loading medicines:', error);
                document.getElementById('medicinesContainer').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><h3>Error Loading Medicines</h3><p>Please try again later.</p></div>';
            }
        }

        async function takeMedicine(userMedicineId, medicineName) {
            const result = await Swal.fire({
                icon: 'question',
                title: 'Take Medicine',
                text: `Are you sure you want to take ${medicineName}?`,
                showCancelButton: true,
                confirmButtonColor: '#00b894',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, take it'
            });

            if (result.isConfirmed) {
                try {
                    const response = await fetch('/api/take_medicine.php', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ user_medicine_id: userMedicineId })
                    });
                    
                    const takeResult = await response.json();
                    
                    if (takeResult.success) {
                        await Swal.fire({
                            icon: 'success',
                            title: 'Medicine Taken',
                            text: `${medicineName} has been recorded as taken. A diary entry has been created automatically.`,
                            confirmButtonColor: '#6c5ce7'
                        });
                        
                        loadMedicines();
                    } else {
                        throw new Error(takeResult.message);
                    }
                } catch (error) {
                    await Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: error.message,
                        confirmButtonColor: '#6c5ce7'
                    });
                }
            }
        }

        async function logout() {
            const result = await Swal.fire({
                icon: 'question',
                title: 'Logout',
                text: 'Are you sure you want to logout?',
                showCancelButton: true,
                confirmButtonColor: '#6c5ce7',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, logout'
            });

            if (result.isConfirmed) {
                try {
                    await fetch('/api/logout.php', { method: 'POST' });
                    sessionStorage.clear();
                    window.location.href = '/login.html';
                } catch (error) {
                    console.error('Logout error:', error);
                    window.location.href = '/login.html';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadMedicines);
    </script>
</body>
</html>
