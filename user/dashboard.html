<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ERU Pregnancy Tracker</title>
    <link rel="manifest" href="../public/manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <h1>
                <i class="bi bi-heart-pulse"></i>
                Dashboard
            </h1>
            <div class="subtitle">Welcome back, <span id="userName">User</span>!</div>
        </div>
        
        <div class="app-content">
            <div class="row g-3">
                <div class="col-12">
                    <div class="stat-card">
                        <div class="icon">
                            <i class="bi bi-prescription2"></i>
                        </div>
                        <div class="number" id="assignedMedicines">-</div>
                        <div class="label">Assigned Medicines</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-capsule me-2"></i>
                    Your Medicines
                </div>
                <div class="card-body">
                    <div id="userMedicines">
                        <div class="text-center">
                            <div class="loading-spinner mx-auto"></div>
                            <div class="mt-2 text-muted">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-clock-history me-2"></i>
                    Recent Medicine Intake
                </div>
                <div class="card-body">
                    <div id="recentIntake">
                        <div class="text-center">
                            <div class="loading-spinner mx-auto"></div>
                            <div class="mt-2 text-muted">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-journal-text me-2"></i>
                    Latest Diary Entries
                </div>
                <div class="card-body">
                    <div id="latestDiary">
                        <div class="text-center">
                            <div class="loading-spinner mx-auto"></div>
                            <div class="mt-2 text-muted">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-items">
                <a href="dashboard.html" class="nav-item active">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="medicine.html" class="nav-item">
                    <i class="bi bi-capsule"></i>
                    <span>Medicine</span>
                </a>
                <a href="diary.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>
                    <span>Diary</span>
                </a>
                <a href="profile.html" class="nav-item">
                    <i class="bi bi-person"></i>
                    <span>Profile</span>
                </a>
                <a href="#" onclick="logout()" class="nav-item">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(registration => console.log('SW registered'))
                .catch(error => console.log('SW registration failed'));
        }

        let userName = sessionStorage.getItem('userName') || 'User';
        document.getElementById('userName').textContent = userName;

        async function loadDashboardData() {
            try {
                const [medicinesResponse, logsResponse, diaryResponse] = await Promise.all([
                    fetch('/api/get_user_medicines.php'),
                    fetch('/api/get_logs.php?limit=5'),
                    fetch('/api/get_diary.php?limit=3')
                ]);

                const medicinesResult = await medicinesResponse.json();
                const logsResult = await logsResponse.json();
                const diaryResult = await diaryResponse.json();

                if (medicinesResult.success) {
                    document.getElementById('assignedMedicines').textContent = medicinesResult.medicines.length;
                    
                    const medicinesHtml = medicinesResult.medicines.map(medicine => `
                        <div class="medicine-card">
                            <div class="medicine-name">${medicine.medicine_name}</div>
                            <div class="quantity">Quantity remaining: <strong>${medicine.quantity}</strong></div>
                        </div>
                    `).join('');
                    
                    document.getElementById('userMedicines').innerHTML = medicinesHtml || '<div class="empty-state"><p>No medicines assigned</p></div>';
                }

                if (logsResult.success) {
                    const logsHtml = logsResult.logs.map(log => `
                        <div class="diary-entry">
                            <div class="entry-date">${log.date} at ${log.time}</div>
                            <div class="entry-text">Took ${log.medicine_name}</div>
                        </div>
                    `).join('');
                    
                    document.getElementById('recentIntake').innerHTML = logsHtml || '<div class="empty-state"><p>No recent medicine intake</p></div>';
                }

                if (diaryResult.success) {
                    const diaryHtml = diaryResult.entries.map(entry => `
                        <div class="diary-entry">
                            <div class="entry-date">${entry.date} at ${entry.time}</div>
                            <div class="entry-text">${entry.entry_text}</div>
                        </div>
                    `).join('');
                    
                    document.getElementById('latestDiary').innerHTML = diaryHtml || '<div class="empty-state"><p>No diary entries</p></div>';
                }
            } catch (error) {
                console.error('Error loading dashboard data:', error);
            }
        }

        async function logout() {
            const result = await Swal.fire({
                icon: 'question',
                title: 'Logout',
                text: 'Are you sure you want to logout?',
                showCancelButton: true,
                confirmButtonColor: '#6c5ce7',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, logout'
            });

            if (result.isConfirmed) {
                try {
                    await fetch('/api/logout.php', { method: 'POST' });
                    sessionStorage.clear();
                    window.location.href = '/login.html';
                } catch (error) {
                    console.error('Logout error:', error);
                    window.location.href = '/login.html';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>
</body>
</html>
