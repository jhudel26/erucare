<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Medicine - ERU Pregnancy Tracker</title>
    <link rel="manifest" href="../public/manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link href="../api/assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <h1>
                <i class="bi bi-capsule"></i>
                Add Medicine
            </h1>
            <div class="subtitle">ERU Pregnancy Tracker</div>
        </div>
        
        <div class="app-content">
            <div class="card">
                <div class="card-body">
                    <form id="addMedicineForm">
                        <div class="mb-3">
                            <label for="medicine_name" class="form-label">Medicine Name</label>
                            <input type="text" class="form-control" id="medicine_name" name="medicine_name" required>
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100" id="addMedicineBtn">
                            <span id="addMedicineText">Add Medicine</span>
                            <span id="addMedicineSpinner" class="loading-spinner" style="display: none;"></span>
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-list-ul me-2"></i>
                    Existing Medicines
                </div>
                <div class="card-body">
                    <div id="medicinesList">
                        <div class="text-center">
                            <div class="loading-spinner mx-auto"></div>
                            <div class="mt-2 text-muted">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-items">
                <a href="dashboard.html" class="nav-item">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="add-user.html" class="nav-item">
                    <i class="bi bi-person-plus"></i>
                    <span>Add User</span>
                </a>
                <a href="add-medicine.html" class="nav-item active">
                    <i class="bi bi-capsule"></i>
                    <span>Medicine</span>
                </a>
                <a href="assign-medicine.html" class="nav-item">
                    <i class="bi bi-prescription2"></i>
                    <span>Assign</span>
                </a>
                <a href="manage-diary.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>
                    <span>Diary</span>
                </a>
                <a href="#" onclick="logout()" class="nav-item">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(registration => console.log('SW registered'))
                .catch(error => console.log('SW registration failed'));
        }

        async function loadMedicines() {
            try {
                const response = await fetch('/api/get_medicines.php');
                const result = await response.json();
                
                if (result.success) {
                    const medicinesHtml = result.medicines.map(medicine => `
                        <div class="medicine-card">
                            <div class="medicine-name">${medicine.medicine_name}</div>
                        </div>
                    `).join('');
                    
                    document.getElementById('medicinesList').innerHTML = medicinesHtml || '<div class="empty-state"><p>No medicines found</p></div>';
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error('Error loading medicines:', error);
                document.getElementById('medicinesList').innerHTML = '<div class="empty-state"><p>Error loading medicines</p></div>';
            }
        }

        document.getElementById('addMedicineForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const addMedicineBtn = document.getElementById('addMedicineBtn');
            const addMedicineText = document.getElementById('addMedicineText');
            const addMedicineSpinner = document.getElementById('addMedicineSpinner');
            
            addMedicineBtn.disabled = true;
            addMedicineText.style.display = 'none';
            addMedicineSpinner.style.display = 'inline-block';
            
            const formData = new FormData(this);
            const data = {
                medicine_name: formData.get('medicine_name')
            };
            
            try {
                const response = await fetch('/api/add_medicine.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    await Swal.fire({
                        icon: 'success',
                        title: 'Success',
                        text: result.message,
                        confirmButtonColor: '#6c5ce7'
                    });
                    
                    this.reset();
                    loadMedicines();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                await Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: error.message,
                    confirmButtonColor: '#6c5ce7'
                });
            } finally {
                addMedicineBtn.disabled = false;
                addMedicineText.style.display = 'inline';
                addMedicineSpinner.style.display = 'none';
            }
        });

        async function logout() {
            const result = await Swal.fire({
                icon: 'question',
                title: 'Logout',
                text: 'Are you sure you want to logout?',
                showCancelButton: true,
                confirmButtonColor: '#6c5ce7',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, logout'
            });

            if (result.isConfirmed) {
                try {
                    await fetch('/api/logout.php', { method: 'POST' });
                    window.location.href = '/login.html';
                } catch (error) {
                    console.error('Logout error:', error);
                    window.location.href = '/login.html';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadMedicines);
    </script>
</body>
</html>
