<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Diary - ERU Pregnancy Tracker</title>
    <link rel="manifest" href="../public/manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link href="../api/assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <h1>
                <i class="bi bi-journal-text"></i>
                Manage Diary
            </h1>
            <div class="subtitle">ERU Pregnancy Tracker</div>
        </div>
        
        <div class="app-content">
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-list-ul me-2"></i>
                    All Diary Entries
                </div>
                <div class="card-body">
                    <div id="diaryEntries">
                        <div class="text-center">
                            <div class="loading-spinner mx-auto"></div>
                            <div class="mt-2 text-muted">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-items">
                <a href="dashboard.html" class="nav-item">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="add-user.html" class="nav-item">
                    <i class="bi bi-person-plus"></i>
                    <span>Add User</span>
                </a>
                <a href="add-medicine.html" class="nav-item">
                    <i class="bi bi-capsule"></i>
                    <span>Medicine</span>
                </a>
                <a href="assign-medicine.html" class="nav-item">
                    <i class="bi bi-prescription2"></i>
                    <span>Assign</span>
                </a>
                <a href="manage-diary.html" class="nav-item active">
                    <i class="bi bi-journal-text"></i>
                    <span>Diary</span>
                </a>
                <a href="#" onclick="logout()" class="nav-item">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(registration => console.log('SW registered'))
                .catch(error => console.log('SW registration failed'));
        }

        async function loadDiaryEntries() {
            try {
                const response = await fetch('/api/get_all_diary.php');
                const result = await response.json();
                
                if (result.success) {
                    const entriesHtml = result.entries.map(entry => `
                        <div class="diary-entry">
                            <div class="entry-date">${entry.created_at} - ${entry.name} (@${entry.username})</div>
                            <div class="entry-text">${entry.entry_text}</div>
                            <div class="entry-actions">
                                <button class="btn btn-danger-custom btn-sm" onclick="deleteEntry(${entry.id})">
                                    <i class="bi bi-trash"></i> Delete
                                </button>
                            </div>
                        </div>
                    `).join('');
                    
                    document.getElementById('diaryEntries').innerHTML = entriesHtml || '<div class="empty-state"><p>No diary entries found</p></div>';
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error('Error loading diary entries:', error);
                document.getElementById('diaryEntries').innerHTML = '<div class="empty-state"><p>Error loading diary entries</p></div>';
            }
        }

        async function deleteEntry(entryId) {
            const result = await Swal.fire({
                icon: 'warning',
                title: 'Delete Entry',
                text: 'Are you sure you want to delete this diary entry?',
                showCancelButton: true,
                confirmButtonColor: '#d63031',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, delete it'
            });

            if (result.isConfirmed) {
                try {
                    const response = await fetch('/api/delete_admin_diary.php', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ entry_id: entryId })
                    });
                    
                    const deleteResult = await response.json();
                    
                    if (deleteResult.success) {
                        await Swal.fire({
                            icon: 'success',
                            title: 'Deleted',
                            text: deleteResult.message,
                            confirmButtonColor: '#6c5ce7'
                        });
                        
                        loadDiaryEntries();
                    } else {
                        throw new Error(deleteResult.message);
                    }
                } catch (error) {
                    await Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: error.message,
                        confirmButtonColor: '#6c5ce7'
                    });
                }
            }
        }

        async function logout() {
            const result = await Swal.fire({
                icon: 'question',
                title: 'Logout',
                text: 'Are you sure you want to logout?',
                showCancelButton: true,
                confirmButtonColor: '#6c5ce7',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, logout'
            });

            if (result.isConfirmed) {
                try {
                    await fetch('/api/logout.php', { method: 'POST' });
                    window.location.href = '/login.html';
                } catch (error) {
                    console.error('Logout error:', error);
                    window.location.href = '/login.html';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadDiaryEntries);
    </script>
</body>
</html>
