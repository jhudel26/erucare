<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Medicine - ERU Pregnancy Tracker</title>
    <link rel="manifest" href="../public/manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <h1>
                <i class="bi bi-prescription2"></i>
                Assign Medicine
            </h1>
            <div class="subtitle">ERU Pregnancy Tracker</div>
        </div>
        
        <div class="app-content">
            <div class="card">
                <div class="card-body">
                    <form id="assignMedicineForm">
                        <div class="mb-3">
                            <label for="user_id" class="form-label">Select User</label>
                            <select class="form-control" id="user_id" name="user_id" required>
                                <option value="">Loading users...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="medicine_id" class="form-label">Select Medicine</label>
                            <select class="form-control" id="medicine_id" name="medicine_id" required>
                                <option value="">Loading medicines...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="quantity" class="form-label">Quantity</label>
                            <input type="number" class="form-control" id="quantity" name="quantity" min="1" required>
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100" id="assignBtn">
                            <span id="assignText">Assign Medicine</span>
                            <span id="assignSpinner" class="loading-spinner" style="display: none;"></span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-items">
                <a href="dashboard.html" class="nav-item">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="add-user.html" class="nav-item">
                    <i class="bi bi-person-plus"></i>
                    <span>Add User</span>
                </a>
                <a href="add-medicine.html" class="nav-item">
                    <i class="bi bi-capsule"></i>
                    <span>Medicine</span>
                </a>
                <a href="assign-medicine.html" class="nav-item active">
                    <i class="bi bi-prescription2"></i>
                    <span>Assign</span>
                </a>
                <a href="manage-diary.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>
                    <span>Diary</span>
                </a>
                <a href="#" onclick="logout()" class="nav-item">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(registration => console.log('SW registered'))
                .catch(error => console.log('SW registration failed'));
        }

        async function loadUsers() {
            try {
                const response = await fetch('/api/get_users.js');
                const result = await response.json();
                
                if (result.success) {
                    const userSelect = document.getElementById('user_id');
                    const usersHtml = result.users.map(user => 
                        `<option value="${user.id}">${user.name} (${user.username})</option>`
                    ).join('');
                    userSelect.innerHTML = '<option value="">Select User</option>' + usersHtml;
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        async function loadMedicines() {
            try {
                const response = await fetch('/api/get_medicines.js');
                const result = await response.json();
                
                if (result.success) {
                    const medicineSelect = document.getElementById('medicine_id');
                    const medicinesHtml = result.medicines.map(medicine => 
                        `<option value="${medicine.id}">${medicine.medicine_name}</option>`
                    ).join('');
                    medicineSelect.innerHTML = '<option value="">Select Medicine</option>' + medicinesHtml;
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error('Error loading medicines:', error);
            }
        }

        document.getElementById('assignMedicineForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const assignBtn = document.getElementById('assignBtn');
            const assignText = document.getElementById('assignText');
            const assignSpinner = document.getElementById('assignSpinner');
            
            assignBtn.disabled = true;
            assignText.style.display = 'none';
            assignSpinner.style.display = 'inline-block';
            
            const formData = new FormData(this);
            const data = {
                user_id: formData.get('user_id'),
                medicine_id: formData.get('medicine_id'),
                quantity: formData.get('quantity')
            };
            
            try {
                const response = await fetch('/api/assign_medicine.js', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    await Swal.fire({
                        icon: 'success',
                        title: 'Success',
                        text: result.message,
                        confirmButtonColor: '#6c5ce7'
                    });
                    
                    this.reset();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                await Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: error.message,
                    confirmButtonColor: '#6c5ce7'
                });
            } finally {
                assignBtn.disabled = false;
                assignText.style.display = 'inline';
                assignSpinner.style.display = 'none';
            }
        });

        async function logout() {
            const result = await Swal.fire({
                icon: 'question',
                title: 'Logout',
                text: 'Are you sure you want to logout?',
                showCancelButton: true,
                confirmButtonColor: '#6c5ce7',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, logout'
            });

            if (result.isConfirmed) {
                try {
                    await fetch('/api/logout.js', { method: 'POST' });
                    window.location.href = '/login.html';
                } catch (error) {
                    console.error('Logout error:', error);
                    window.location.href = '/login.html';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadUsers();
            loadMedicines();
        });
    </script>
</body>
</html>
