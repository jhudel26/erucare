<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ERU Pregnancy Tracker</title>
    <link rel="manifest" href="../public/manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <h1>
                <i class="bi bi-shield-check"></i>
                Admin Dashboard
            </h1>
            <div class="subtitle">ERU Pregnancy Tracker</div>
        </div>
        
        <div class="app-content">
            <div class="row g-3">
                <div class="col-6">
                    <div class="stat-card">
                        <div class="icon">
                            <i class="bi bi-people-fill"></i>
                        </div>
                        <div class="number" id="totalUsers">-</div>
                        <div class="label">Total Users</div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="stat-card">
                        <div class="icon">
                            <i class="bi bi-capsule"></i>
                        </div>
                        <div class="number" id="totalMedicines">-</div>
                        <div class="label">Total Medicines</div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="stat-card">
                        <div class="icon">
                            <i class="bi bi-prescription2"></i>
                        </div>
                        <div class="number" id="assignedMedicines">-</div>
                        <div class="label">Assigned Medicines</div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="stat-card">
                        <div class="icon">
                            <i class="bi bi-journal-text"></i>
                        </div>
                        <div class="number" id="recentDiariesCount">-</div>
                        <div class="label">Recent Entries</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-clock-history me-2"></i>
                    Recent Diary Entries
                </div>
                <div class="card-body">
                    <div id="recentDiaries">
                        <div class="text-center">
                            <div class="loading-spinner mx-auto"></div>
                            <div class="mt-2 text-muted">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-items">
                <a href="dashboard.html" class="nav-item active">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="add-user.html" class="nav-item">
                    <i class="bi bi-person-plus"></i>
                    <span>Add User</span>
                </a>
                <a href="add-medicine.html" class="nav-item">
                    <i class="bi bi-capsule"></i>
                    <span>Medicine</span>
                </a>
                <a href="assign-medicine.html" class="nav-item">
                    <i class="bi bi-prescription2"></i>
                    <span>Assign</span>
                </a>
                <a href="manage-diary.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>
                    <span>Diary</span>
                </a>
                <a href="#" onclick="logout()" class="nav-item">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(registration => console.log('SW registered'))
                .catch(error => console.log('SW registration failed'));
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/get_admin_stats.php');
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('totalUsers').textContent = result.stats.total_users;
                    document.getElementById('totalMedicines').textContent = result.stats.total_medicines;
                    document.getElementById('assignedMedicines').textContent = result.stats.assigned_medicines;
                    document.getElementById('recentDiariesCount').textContent = result.stats.recent_diaries.length;
                    
                    const diariesHtml = result.stats.recent_diaries.map(entry => `
                        <div class="diary-entry">
                            <div class="entry-date">${entry.created_at} - ${entry.name}</div>
                            <div class="entry-text">${entry.entry_text}</div>
                        </div>
                    `).join('');
                    
                    document.getElementById('recentDiaries').innerHTML = diariesHtml || '<div class="empty-state"><p>No recent diary entries</p></div>';
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error('Error loading stats:', error);
                document.getElementById('recentDiaries').innerHTML = '<div class="empty-state"><p>Error loading data</p></div>';
            }
        }

        async function logout() {
            const result = await Swal.fire({
                icon: 'question',
                title: 'Logout',
                text: 'Are you sure you want to logout?',
                showCancelButton: true,
                confirmButtonColor: '#6c5ce7',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, logout'
            });

            if (result.isConfirmed) {
                try {
                    await fetch('/api/logout.php', { method: 'POST' });
                    window.location.href = '/login.html';
                } catch (error) {
                    console.error('Logout error:', error);
                    window.location.href = '/login.html';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadStats);
    </script>
</body>
</html>
