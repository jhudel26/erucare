<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User - ERU Pregnancy Tracker</title>
    <link rel="manifest" href="../public/manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link href="/api/assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <h1>
                <i class="bi bi-person-plus"></i>
                Add User
            </h1>
            <div class="subtitle">ERU Pregnancy Tracker</div>
        </div>
        
        <div class="app-content">
            <div class="card">
                <div class="card-body">
                    <form id="addUserForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="mb-3">
                            <label for="role" class="form-label">Role</label>
                            <select class="form-control" id="role" name="role" required>
                                <option value="">Select Role</option>
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100" id="addUserBtn">
                            <span id="addUserText">Add User</span>
                            <span id="addUserSpinner" class="loading-spinner" style="display: none;"></span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-items">
                <a href="dashboard.html" class="nav-item">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="add-user.html" class="nav-item active">
                    <i class="bi bi-person-plus"></i>
                    <span>Add User</span>
                </a>
                <a href="add-medicine.html" class="nav-item">
                    <i class="bi bi-capsule"></i>
                    <span>Medicine</span>
                </a>
                <a href="assign-medicine.html" class="nav-item">
                    <i class="bi bi-prescription2"></i>
                    <span>Assign</span>
                </a>
                <a href="manage-diary.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>
                    <span>Diary</span>
                </a>
                <a href="#" onclick="logout()" class="nav-item">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(registration => console.log('SW registered'))
                .catch(error => console.log('SW registration failed'));
        }

        document.getElementById('addUserForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const addUserBtn = document.getElementById('addUserBtn');
            const addUserText = document.getElementById('addUserText');
            const addUserSpinner = document.getElementById('addUserSpinner');
            
            addUserBtn.disabled = true;
            addUserText.style.display = 'none';
            addUserSpinner.style.display = 'inline-block';
            
            const formData = new FormData(this);
            const data = {
                name: formData.get('name'),
                username: formData.get('username'),
                password: formData.get('password'),
                role: formData.get('role')
            };
            
            try {
                const response = await fetch('/api/add_user.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    await Swal.fire({
                        icon: 'success',
                        title: 'Success',
                        text: result.message,
                        confirmButtonColor: '#6c5ce7'
                    });
                    
                    this.reset();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                await Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: error.message,
                    confirmButtonColor: '#6c5ce7'
                });
            } finally {
                addUserBtn.disabled = false;
                addUserText.style.display = 'inline';
                addUserSpinner.style.display = 'none';
            }
        });

        async function logout() {
            const result = await Swal.fire({
                icon: 'question',
                title: 'Logout',
                text: 'Are you sure you want to logout?',
                showCancelButton: true,
                confirmButtonColor: '#6c5ce7',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, logout'
            });

            if (result.isConfirmed) {
                try {
                    await fetch('/api/logout.php', { method: 'POST' });
                    window.location.href = '/login.html';
                } catch (error) {
                    console.error('Logout error:', error);
                    window.location.href = '/login.html';
                }
            }
        }
    </script>
</body>
</html>
